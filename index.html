<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Triumvirato</title>

<style>
*{box-sizing:border-box}

body{
    margin:0;
    min-height:100vh;
    background:#081126;
    color:#f4ecd8;
    font-family:Georgia,serif;
    display:flex;
    justify-content:center;
}

.container{
    width:100%;
    max-width:1000px;
    padding:20px;
    text-align:center;
}

h1{
    font-size:clamp(42px,10vw,72px);
    color:#f3ce76;
    margin:0;
}

p{
    margin-bottom:30px;
}

select,button{
    width:100%;
    max-width:450px;
    padding:16px;
    border-radius:30px;
    font-size:18px;
    margin:8px;
    border:none;
}

button{
    cursor:pointer;
    background:#f3ce76;
}

#counter{
    font-size:clamp(20px,5vw,30px);
    margin:25px 0;
    color:#f3ce76;
}

#status{
    font-size:clamp(24px,6vw,38px);
    min-height:90px;
    color:#f3ce76;
    margin-bottom:20px;
}

#grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(130px,1fr));
    gap:10px;
    width:100%;
}

.region{
    padding:16px;
    border-radius:12px;
    background:#1c2c58;
    transition:all 1s ease;
    word-break:break-word;
}

.off{
    background:#111827;
    opacity:.2;
    transform:scale(.95);
}

.winner{
    background:#f3ce76 !important;
    color:black;
    box-shadow:0 0 40px #f3ce76;
    transform:scale(1.08);
}

@media(max-width:600px){
    .container{
        padding:15px;
    }

    #grid{
        grid-template-columns:repeat(2,1fr);
    }
}
</style>
</head>

<body>

<div class="container">

<h1>TRIUMVIRATO</h1>

<p>Tre amici. Tre dottorati. Una sola regione sopravviverà.</p>

<select id="winner">
<option>Valle d'Aosta</option>
<option>Piemonte</option>
<option>Liguria</option>
<option>Lombardia</option>
<option>Trentino-Alto Adige</option>
<option>Veneto</option>
<option>Friuli-Venezia Giulia</option>
<option>Emilia-Romagna</option>
<option>Toscana</option>
<option>Umbria</option>
<option>Marche</option>
<option>Lazio</option>
<option>Abruzzo</option>
<option>Molise</option>
<option>Campania</option>
<option>Puglia</option>
<option>Basilicata</option>
<option>Calabria</option>
<option>Sicilia</option>
<option>Sardegna</option>
</select>

<br>

<button onclick="startGame()">INIZIA IL GIOCO</button>

<div id="counter"></div>

<div id="status">
Scegli la regione vincente.
</div>

<div id="grid"></div>

</div>

<script>

const regions=[
"Valle d'Aosta",
"Piemonte",
"Liguria",
"Lombardia",
"Trentino-Alto Adige",
"Veneto",
"Friuli-Venezia Giulia",
"Emilia-Romagna",
"Toscana",
"Umbria",
"Marche",
"Lazio",
"Abruzzo",
"Molise",
"Campania",
"Puglia",
"Basilicata",
"Calabria",
"Sicilia",
"Sardegna"
];

const grid=document.getElementById("grid");

function rid(r){
    return "r"+btoa(unescape(encodeURIComponent(r)));
}

function draw(){
    grid.innerHTML="";

    regions.forEach(r=>{

        const div=document.createElement("div");

        div.className="region";
        div.id=rid(r);
        div.innerText=r;

        grid.appendChild(div);

    });
}

draw();

function getDelay(rem){

    if(rem>10) return 600;
    if(rem>6) return 1200;
    if(rem>4) return 2500;
    if(rem>2) return 4500;

    return 7000;
}


function startGame(){

    draw();

    const winner=document.getElementById("winner").value;

    const others=regions
    .filter(r=>r!==winner)
    .sort(()=>Math.random()-0.5);

    let i=0;

    document.getElementById("status").innerText=
    "IL VERDETTO SI AVVICINA";

    document.getElementById("counter").innerText=
    "20 REGIONI ANCORA IN GIOCO";


    function next(){

        if(i>=others.length){

            document.getElementById(rid(winner))
            .classList.add("winner");

            document.getElementById("status").innerHTML=
            "IL TRIUMVIRATO HA DECISO<br>"+winner.toUpperCase();

            document.getElementById("counter").innerText="";

            return;
        }


        const name=others[i++];

        document.getElementById(rid(name))
        .classList.add("off");


        const remainingOthers=others.length-i;
        const totalRemaining=remainingOthers+1;


        document.getElementById("counter").innerText=
        totalRemaining+" REGIONI ANCORA IN GIOCO";


        if(totalRemaining<=5 && totalRemaining>2){
            document.getElementById("status").innerText=
            "LA TENSIONE SALE...";
        }

        if(totalRemaining<=2){
            document.getElementById("status").innerText=
            "IL TRIUMVIRATO STA DECIDENDO...";
        }


        setTimeout(next,getDelay(totalRemaining));

    }

    setTimeout(next,2500);

}

</script>

</body>
</html>
